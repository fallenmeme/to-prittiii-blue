<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aesthetic Journal</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- PAGE 1 -->
    <section class="panel cover">
        <div class="overlay">
            <img src="Picsart_26-07-04_13-44-36-042.png" alt="Cover">
        </div>
    </section>

<section class="panel scenery">

    <div class="poster">

        <div class="text-box">

            <h1>Scenery</h1>

            <p>
                Write your title here.

                <br><br>

                This is your poem, journal,
                or message.

                <br><br>

                Everything written here can
                be edited directly inside
                index.html.
            </p>

        </div>

        <img src="IMG_20260704_165012.jpg" class="poster-image">

    </div>

</section>

<section class="panel journal">

    <div class="journal">

        <img src="IMG_20260704_164937.jpg" class="journal-image">

        <div class="journal-text">

            <div class="date">
                13 / 07 / 25
            </div>

            <p>
                Write your journal here.

                You can make it as long
                as you want.

                This paragraph is editable
                by simply changing the HTML.
            </p>

        </div>

    </div>

</section>
<script src="script.js"></script>

</body>
</html>
