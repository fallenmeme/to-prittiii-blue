<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aesthetic Journal</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- PAGE 1 -->
    <section class="panel cover">
        <div class="overlay">
            <img src="e8a187cc895586b76771accbcaf2e688.jpg" alt="Cover">
        </div>
    </section>

<!-- PAGE 2 -->
    <section class="panel scenery">

        <div class="card reverse">

            <div class="text">
                <h1>Scenery</h1>

                <p>
                    Replace this with your own poem.
                    Every paragraph can be edited inside
                    index.html.
                </p>
            </div>

            <img src="images/scenery.jpg" alt="Scenery">

        </div>

    </section>

    <!-- PAGE 3 -->
    <section class="panel journal">

        <div class="card">

            <img src="images/journal.jpg" alt="Journal">

            <div class="text">

                <h3>13 / 07 / 25</h3>

                <p>
                    Replace this journal entry with
                    your own writing.
                    You can make this as long as you want.
                </p>

            </div>

        </div>

    </section>

<script src="script.js"></script>

</body>
</html>
